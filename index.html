<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Redirector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: all 0.3s;
            font-family: monospace;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #dc3545;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .examples {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .examples h3 {
            color: #555;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .example-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .example-btn {
            background: #f0f0f0;
            color: #667eea;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-family: monospace;
            cursor: pointer;
            transition: background 0.2s;
        }

        .example-btn:hover {
            background: #e0e0e0;
        }

        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 URL Redirector</h1>
        <div class="subtitle">Enter a URL and click the button to redirect</div>

        <div class="input-group">
            <label for="urlInput">Enter URL:</label>
            <input type="text" id="urlInput" placeholder="e.g., https://www.google.com or google.com">
        </div>

        <button id="redirectBtn">🚀 Redirect to URL</button>

        <div id="errorMessage" class="error-message">
            ⚠️ <span id="errorText"></span>
        </div>

        <div class="examples">
            <h3>📋 Example URLs (click to test):</h3>
            <div class="example-buttons">
                <div class="example-btn" data-url="https://www.google.com">https://www.google.com</div>
                <div class="example-btn" data-url="https://github.com">https://github.com</div>
                <div class="example-btn" data-url="https://www.wikipedia.org">https://www.wikipedia.org</div>
                <div class="example-btn" data-url="https://stackoverflow.com">https://stackoverflow.com</div>
            </div>
        </div>
        <div class="info">
            💡 Enter a full URL (including https://) for best results
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const redirectBtn = document.getElementById('redirectBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        // Validate URL and redirect
        function redirectToUrl() {
            const input = urlInput.value.trim();
            
            if (!input) {
                errorText.textContent = 'Please enter a URL';
                errorMessage.classList.add('show');
                return;
            }

            let url = input;
            
            // Add https:// if no protocol is specified
            if (!url.match(/^[a-zA-Z][a-zA-Z0-9+.-]*:/) && !url.startsWith('//')) {
                url = 'https://' + url;
            }
            
            // Validate URL format
            try {
                const testUrl = new URL(url);
                
                // Basic domain validation
                const hostname = testUrl.hostname;
                if (!hostname || hostname.length < 3) {
                    errorText.textContent = 'Invalid domain name';
                    errorMessage.classList.add('show');
                    return;
                }
                
                // Hide any previous error
                errorMessage.classList.remove('show');
                
                // Show loading state
                redirectBtn.textContent = '⏳ Redirecting...';
                redirectBtn.disabled = true;
                
                // Redirect to the URL
                window.location.href = url;
                
            } catch (e) {
                errorText.textContent = 'Invalid URL format. Please include a valid domain (e.g., example.com)';
                errorMessage.classList.add('show');
            }
        }

        // Handle Enter key
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                redirectToUrl();
            }
        });

        // Clear error when user starts typing
        urlInput.addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });

        // Redirect button click
        redirectBtn.addEventListener('click', redirectToUrl);

        // Example buttons
        document.querySelectorAll('.example-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const exampleUrl = btn.dataset.url;
                urlInput.value = exampleUrl;
                errorMessage.classList.remove('show');
                urlInput.focus();
            });
        });

        // Initial focus
        urlInput.focus();
    </script>
</body>
</html>
